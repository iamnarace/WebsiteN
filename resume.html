<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naresh Adhikari | Resume</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f5fb;
      color: #1a1a1a;
    }
    .resume-shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 18px 50px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }
    .topbar h1 {
      font-size: 28px;
      margin: 0;
    }
    .topbar p {
      margin: 6px 0 0;
      font-size: 14px;
      line-height: 1.6;
      color: #444;
    }
    .action {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 18px;
      border-radius: 999px;
      background: #2506ad;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
    .note {
      background: #fff;
      border-left: 4px solid #2506ad;
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 22px;
      line-height: 1.7;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .page {
      background: #fff;
      margin-bottom: 18px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
    }
    .page img {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="resume-shell">
    <div class="topbar">
      <div>
        <h1>Naresh Adhikari - Resume</h1>
        <p>Web view of the uploaded resume for simple read-only viewing.</p>
      </div>
      <a class="action" href="./index.html"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
    </div>

    <div class="note">
      This page shows the resume as images instead of selectable text, which makes direct copying harder in a browser.
      It is not full protection because screenshots and OCR are still possible.
    </div>

    <div class="page"><img src="./assets/files/resume-page-1.png" alt="Resume page 1" /></div>
    <div class="page"><img src="./assets/files/resume-page-2.png" alt="Resume page 2" /></div>
    <div class="page"><img src="./assets/files/resume-page-3.png" alt="Resume page 3" /></div>
  </div>
</body>
</html>
